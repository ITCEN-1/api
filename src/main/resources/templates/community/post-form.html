<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>게시글 작성</title>
    <link rel="stylesheet" href="/css/community.css" th:href="@{/css/community.css}">
</head>
<body>
<nav th:replace="~{fragments/nav :: communityNav}"></nav>

<main class="dp-page">
    <div class="page page--narrow">
        <header class="top-bar">
            <div>
                <h1>게시글 작성</h1>
                <p>동네 사람들과 나누고 싶은 이야기를 남겨보세요.</p>
            </div>
        </header>

        <section class="section card">
            <div class="card__body">
                <form th:action="@{/communities/posts}" th:object="${form}" method="post">
                    <div class="location-row">
                        <div class="form-row">
                            <label for="districtSelect">구 선택</label>
                            <select id="districtSelect" th:field="*{districtName}">
                                <option value="">구를 선택하세요</option>
                                <option th:each="dist : ${districts}" th:value="${dist}" th:text="${dist}">구</option>
                            </select>
                        </div>

                        <div class="form-row">
                            <label for="dongSelect">동 선택</label>
                            <select id="dongSelect" th:field="*{dongCode}" required>
                                <option value="">동을 선택하세요</option>
                                <option th:each="d : ${dongs}" th:value="${d.dongCode}" th:text="${d.dongName}">동</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <label for="title">제목</label>
                        <input id="title" type="text" th:field="*{title}" maxlength="100" required>
                    </div>

                    <div class="form-row">
                        <label for="content">본문</label>
                        <textarea id="content" th:field="*{content}" rows="10" required></textarea>
                    </div>

                    <div class="actions">
                        <button type="submit">작성</button>
                        <a class="button-link" th:href="@{/communities/posts}" href="/communities/posts">취소</a>
                    </div>
                </form>
            </div>
        </section>
    </div>
</main>

<script th:src="@{/js/community.js}"></script>
<script th:src="@{/js/community-location.js}"></script>
</body>
</html>
