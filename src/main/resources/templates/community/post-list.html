<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 목록</title>
    <style>
        body { font-family: sans-serif; margin: 24px; }
        .page { max-width: 1000px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid #ddd; }
        .top-actions, .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .section { margin-bottom: 24px; }
        .message { margin-bottom: 16px; padding: 10px; border: 1px solid #ddd; }
        .filter-form { display: grid; grid-template-columns: 1.5fr 1fr 1fr auto auto; gap: 8px; align-items: center; }
        input[type="text"], select { width: 100%; box-sizing: border-box; padding: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #ddd; padding: 10px; text-align: left; }
        .post-title-link { color: inherit; text-decoration: none; }
        .post-title-link:hover { text-decoration: underline; }
        .empty-message { padding: 24px 0; color: #666; border-top: 1px solid #ddd; border-bottom: 1px solid #ddd; }
        .pager-wrap { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; margin-top: 20px; }
        .pager { grid-column: 2; display: flex; gap: 8px; align-items: center; justify-content: center; }
        .pager-right { grid-column: 3; justify-self: end; }
        button, a.button-link { padding: 6px 10px; cursor: pointer; text-decoration: none; color: inherit; border: 1px solid #aaa; background: #fff; font-size: 14px; }
        .disabled, .current { padding: 6px 10px; border: 1px solid #ddd; }
        .disabled { color: #aaa; }
        @media (max-width: 760px) {
            .top-bar { flex-direction: column; align-items: flex-start; gap: 12px; }
            .filter-form { grid-template-columns: 1fr; }
            .pager-wrap { grid-template-columns: 1fr; gap: 12px; }
            .pager, .pager-right { grid-column: 1; justify-self: center; }
            th:nth-child(1), td:nth-child(1), th:nth-child(5), td:nth-child(5) { display: none; }
        }
    </style>
</head>
<body>
<div class="page">
    <header class="top-bar">
        <h2>게시글 목록</h2>
        <div class="top-actions">
            <a class="button-link" th:href="@{/communities/posts}">목록</a>
            <a class="button-link" th:href="@{/communities/posts/new}">글쓰기</a>
            <button type="button" id="logoutBtn">로그아웃</button>
        </div>
    </header>

    <section class="section">
        <div class="message" th:if="${successMessage}" th:text="${successMessage}">처리 메시지</div>

        <form class="filter-form" th:action="@{/communities/posts}" method="get">
            <input type="text" name="titleKeyword" placeholder="제목 검색" th:value="${titleKeyword}">
            <select id="districtSelect" name="district">
                <option value="">구 전체</option>
                <option th:each="dist : ${districts}" th:value="${dist}" th:text="${dist}" th:selected="${dist == district}">구</option>
            </select>
            <select id="dongSelect" name="dongCode">
                <option value="">동 전체</option>
                <option th:each="d : ${dongs}" th:value="${d.dongCode}" th:text="${d.dongName}" th:selected="${dongCode != null and d.dongCode == dongCode}">동</option>
            </select>
            <button type="submit">검색</button>
            <a class="button-link" th:href="@{/communities/posts}">초기화</a>
        </form>
    </section>

    <section class="section">
        <table th:if="${!postPage.isEmpty()}">
            <thead>
            <tr><th>ID</th><th>제목</th><th>작성자</th><th>지역</th><th>작성일</th><th>조회수</th></tr>
            </thead>
            <tbody>
            <tr th:each="post : ${posts}">
                <td th:text="${post.postId}">1</td>
                <td><a class="post-title-link" th:href="@{/communities/posts/{postId}(postId=${post.postId})}" th:text="${post.title}">제목</a></td>
                <td th:text="${post.writerName}">작성자</td>
                <td><span th:text="${post.districtName}">구</span> <span th:text="${post.dongName}">동</span></td>
                <td th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-25 10:00</td>
                <td th:text="${post.viewCount}">0</td>
            </tr>
            </tbody>
        </table>

        <div class="empty-message" th:if="${postPage.isEmpty()}">게시글이 없습니다.</div>

        <div class="pager-wrap">
            <div class="pager">
                <a class="button-link" th:if="${postPage.hasPrevious()}" th:href="@{/communities/posts(page=${postPage.number - 1}, titleKeyword=${titleKeyword}, district=${district}, dongCode=${dongCode})}">이전</a>
                <span class="disabled" th:if="${!postPage.hasPrevious()}">이전</span>
                <span class="current" th:text="${postPage.number + 1} + ' / ' + ${postPage.totalPages == 0 ? 1 : postPage.totalPages}">1 / 1</span>
                <a class="button-link" th:if="${postPage.hasNext()}" th:href="@{/communities/posts(page=${postPage.number + 1}, titleKeyword=${titleKeyword}, district=${district}, dongCode=${dongCode})}">다음</a>
                <span class="disabled" th:if="${!postPage.hasNext()}">다음</span>
            </div>
            <div class="pager-right">
                <a class="button-link" th:href="@{/communities/posts}">전체 목록</a>
            </div>
        </div>
    </section>
</div>

<script>
    document.getElementById('logoutBtn')?.addEventListener('click', async () => {
        if (!confirm('로그아웃하시겠습니까?')) return;
        const res = await fetch('/api/auth/logout', { method: 'POST' });
        if (res.ok) location.href = '/auth/login';
        else alert('로그아웃에 실패했습니다.');
    });

    const districtSelect = document.getElementById('districtSelect');
    const dongSelect = document.getElementById('dongSelect');

    function resetDongOptions() {
        dongSelect.innerHTML = '<option value="">동을 선택하세요</option>';
    }

    if (districtSelect && dongSelect) {
        districtSelect.addEventListener('change', async () => {
            resetDongOptions();

            const district = districtSelect.value;

            if (!district) {
                return;
            }

            try {
                const response = await fetch(`/communities/dongs?district=${encodeURIComponent(district)}`);

                if (!response.ok) {
                    alert('동 목록을 불러오지 못했습니다.');
                    return;
                }

                const body = await response.json();
                const dongs = Array.isArray(body) ? body : body.content;

                if (!Array.isArray(dongs)) {
                    alert('동 목록 응답 형식이 올바르지 않습니다.');
                    return;
                }

                dongs.forEach((dong) => {
                    const option = document.createElement('option');
                    option.value = dong.dongCode;
                    option.textContent = dong.dongName;
                    dongSelect.appendChild(option);
                });
            } catch (error) {
                console.error(error);
                alert('동 목록을 불러오지 못했습니다.');
            }
        });
    }
</script>
</body>
</html>
