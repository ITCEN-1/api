<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <th:block th:insert="~{fragments/head :: favicon}"></th:block>
    <title th:text="${pageTitle}">게시글 목록</title>
    <link rel="stylesheet" href="/css/community.css" th:href="@{/css/community.css}">
</head>
<body>
<nav th:replace="~{fragments/nav :: communityNav}"></nav>

<main class="dp-page">
    <div class="page">
        <header class="top-bar">
            <div>
                <h1 th:text="${dongName != null ? district + ' ' + dongName + ' 게시판' : (district != null  and !#strings.isEmpty(district) ? district + ' 게시판' : '동네 게시판')}">
                    동네 게시판
                </h1>
                <p>같은 동네에 사는 사람들과 소소한 정보를 나눠보세요.</p>
            </div>
            <div class="actions">
            <a class="button-link" th:href="@{/communities/my/posts}" href="/communities/my/posts">내 글 보기</a>
            <a class="button-link primary" th:href="@{/communities/posts/new}" href="/communities/posts/new">새 글 쓰기</a>
            </div>
        </header>

        <section class="section">
            <div class="message" th:if="${successMessage}" th:text="${successMessage}">처리 메시지</div>

            <div class="card">
                <div class="card__body">
                    <form class="filter-form" th:action="@{${listUrl}}" method="get">
                        <label style="position:absolute;left:-9999px">제목 검색
                          <input id="titleKeyword" type="text" name="titleKeyword" placeholder="제목 검색" th:value="${titleKeyword}">
                        </label>

                        <label style="position:absolute;left:-9999px">구 선택
                          <select id="districtSelect" name="district">
                            <option value="">구 전체</option>
                            <option th:each="dist : ${districts}" th:value="${dist}" th:text="${dist}" th:selected="${dist == district}">구</option>
                          </select>
                        </label>

                        <label style="position:absolute;left:-9999px">동 선택
                          <select id="dongSelect" name="dongCode">
                            <option value="">동 전체</option>
                            <option th:each="d : ${dongs}" th:value="${d.dongCode}" th:text="${d.dongName}" th:selected="${dongCode != null and d.dongCode == dongCode}">동</option>
                          </select>
                        </label>

                        <button type="submit">검색</button>
                        <a class="button-link" th:href="@{/communities/posts}" href="/communities/posts">초기화</a>
                    </form>
                </div>
            </div>
        </section>

        <section class="section card">
            <div class="table-wrap" th:if="${!postPage.isEmpty()}">
                <table>
                    <thead>
                    <tr>
                        <th>작성자</th>
                        <th>제목</th>
                        <th>지역</th>
                        <th>작성일</th>
                        <th>조회수</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="post : ${posts}">
                        <td th:text="${post.writerName}">작성자</td>
                        <td>
                            <a class="post-title-link" th:href="@{/communities/posts/{postId}(postId=${post.postId})}" th:text="${post.title}">제목</a>
                        </td>
                        <td>
                            <span th:text="${post.districtName}">구</span>
                            <span th:text="${post.dongName}">동</span>
                        </td>
                        <td th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}">2026-05-25</td>
                        <td th:text="${post.viewCount}">0</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="empty-message" th:if="${postPage.isEmpty()}">게시글이 없습니다.</div>
        </section>

        <div class="pager-wrap">
            <div class="pager">
                <a class="button-link"
                   th:if="${postPage.hasPrevious()}"
                   th:href="@{${listUrl}(page=${postPage.number - 1}, titleKeyword=${titleKeyword}, district=${district}, dongCode=${dongCode})}">
                    이전
                </a>
                <span class="disabled" th:if="${!postPage.hasPrevious()}">이전</span>
                <span class="current" th:text="${postPage.number + 1} + ' / ' + ${postPage.totalPages == 0 ? 1 : postPage.totalPages}">1 / 1</span>
                <a class="button-link"
                   th:if="${postPage.hasNext()}"
                   th:href="@{${listUrl}(page=${postPage.number + 1}, titleKeyword=${titleKeyword}, district=${district}, dongCode=${dongCode})}">
                    다음
                </a>
                <span class="disabled" th:if="${!postPage.hasNext()}">다음</span>
            </div>
        </div>
    </div>
</main>

<script th:src="@{/js/community.js}"></script>
<script th:src="@{/js/community-location.js}"></script>
</body>
</html>
