<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>게시글 수정</title>
    <link rel="stylesheet" href="/css/community.css" th:href="@{/css/community.css}">
</head>
<body>
<nav th:replace="~{fragments/nav :: communityNav}"></nav>

<main class="dp-page">
    <div class="page page--narrow">
        <header class="top-bar">
            <div>
                <h1>게시글 수정</h1>
                <p>작성한 글의 내용과 지역 정보를 수정할 수 있어요.</p>
            </div>
        </header>

        <section class="section card">
            <div class="card__body">
                <form th:action="@{/communities/posts/{postId}/edit(postId=${postId})}"
                      th:object="${form}"
                      method="post">

                    <div class="location-row">
                        <div class="form-row">
                            <label for="districtSelect">구 선택</label>
                            <select id="districtSelect" th:field="*{districtName}">
                                <option value="">구를 선택하세요</option>
                                <option th:each="dist : ${districts}"
                                        th:value="${dist}"
                                        th:text="${dist}"
                                        th:selected="${dist == form.districtName}">
                                    구
                                </option>
                            </select>
                        </div>

                        <div class="form-row">
                            <label for="dongSelect">동 선택</label>
                            <select id="dongSelect" th:field="*{dongCode}" required>
                                <option value="">동을 선택하세요</option>
                                <option th:each="d : ${dongs}"
                                        th:value="${d.dongCode}"
                                        th:text="${d.dongName}"
                                        th:selected="${d.dongCode == form.dongCode}">
                                    동
                                </option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <label for="title">제목</label>
                        <input id="title"
                               type="text"
                               th:field="*{title}"
                               maxlength="100"
                               required>
                    </div>

                    <div class="form-row">
                        <label for="content">본문</label>
                        <textarea id="content"
                                  th:field="*{content}"
                                  rows="10"
                                  required></textarea>
                    </div>

                    <div class="actions">
                        <button type="submit">수정 완료</button>
                        <a class="button-link"
                           th:href="@{/communities/posts/{postId}(postId=${postId})}">
                            취소
                        </a>
                    </div>
                </form>
            </div>
        </section>
    </div>
</main>

<script>
    document.getElementById('logoutBtn')?.addEventListener('click', async () => {
        if (!confirm('로그아웃하시겠습니까?')) return;
        const res = await fetch('/api/auth/logout', { method: 'POST' });
        if (res.ok) location.href = '/auth/login';
        else alert('로그아웃에 실패했습니다.');
    });

    const districtSelect = document.getElementById('districtSelect');
    const dongSelect = document.getElementById('dongSelect');

    function resetDongOptions() {
        dongSelect.innerHTML = '<option value="">동을 선택하세요</option>';
    }

    if (districtSelect && dongSelect) {
        districtSelect.addEventListener('change', async () => {
            resetDongOptions();

            const district = districtSelect.value;

            if (!district) {
                return;
            }

            try {
                const response = await fetch(`/communities/dongs?district=${encodeURIComponent(district)}`);

                if (!response.ok) {
                    alert('동 목록을 불러오지 못했습니다.');
                    return;
                }

                const body = await response.json();
                const dongs = Array.isArray(body) ? body : body.content;

                if (!Array.isArray(dongs)) {
                    alert('동 목록 응답 형식이 올바르지 않습니다.');
                    return;
                }

                dongs.forEach((dong) => {
                    const option = document.createElement('option');
                    option.value = dong.dongCode;
                    option.textContent = dong.dongName;
                    dongSelect.appendChild(option);
                });
            } catch (error) {
                console.error(error);
                alert('동 목록을 불러오지 못했습니다.');
            }
        });
    }
</script>
</body>
</html>
