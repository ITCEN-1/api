<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>게시글 상세</title>
    <link rel="stylesheet" href="/css/community.css" th:href="@{/css/community.css}">
</head>

<body>
<nav th:replace="~{fragments/nav :: communityNav}"></nav>

<main class="dp-page">
    <div class="page page--narrow">
        <header class="top-bar">
            <div>
                <h1>게시글 상세</h1>
                <p>동네 게시글과 댓글을 확인해보세요.</p>
            </div>
            <a class="button-link" th:href="@{/communities/posts}" href="/communities/posts">목록</a>
        </header>

        <section class="section card">
            <div class="card__body">
                <h2 th:text="${post.title}">게시글 제목</h2>

                <div class="post-meta">
                    <span>
                        작성자
                        <strong th:text="${post.writerName}">작성자</strong>
                    </span>

                    <span>
                        지역
                        <span th:text="${post.districtName}">구</span>
                        <span th:text="${post.dongName}">동</span>
                    </span>

                    <span>
                        작성일
                        <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">
                            2026-05-25 10:00
                        </span>
                    </span>

                    <span>
                        조회수
                        <span th:text="${post.viewCount}">0</span>
                    </span>
                </div>

                <div class="post-content" th:text="${post.content}">
                    게시글 본문
                </div>

                <div class="actions">
                    <a class="button-link"
                       th:if="${editable}"
                       th:href="@{/communities/posts/{postId}/edit(postId=${post.postId})}">
                        수정
                    </a>

                    <form th:if="${editable}"
                          class="inline-form"
                          th:action="@{/communities/posts/{postId}/delete(postId=${post.postId})}"
                          method="post"
                          onsubmit="return confirm('게시글을 삭제하시겠습니까?');">
                        <button type="submit" class="danger">삭제</button>
                    </form>
                </div>
            </div>
        </section>

        <section class="section card" id="commentSection" th:fragment="commentSection">
            <div class="card__body">
                <h3>댓글</h3>

                <form class="comment-form"
                      th:action="@{/communities/posts/{postId}/comments(postId=${postId})}"
                      method="post">

                    <div class="form-row">
                        <textarea name="content"
                                  rows="3"
                                  maxlength="500"
                                  required
                                  placeholder="댓글을 입력하세요"></textarea>
                    </div>

                    <div class="actions">
                        <button type="submit">댓글 작성</button>
                    </div>
                </form>

                <div class="empty-message" th:if="${#lists.isEmpty(comments)}">
                    아직 댓글이 없습니다.
                </div>

                <div class="comment-list" th:if="${!#lists.isEmpty(comments)}">
                    <article class="comment-item"
                             th:each="comment : ${comments}"
                             th:data-comment-id="${comment.commentId}">

                        <div class="comment-view-area">
                            <div class="comment-meta">
                                <span>
                                    작성자
                                    <strong th:text="${comment.writerName}">작성자</strong>
                                </span>

                                <span>
                                    작성일
                                    <span th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}">
                                        2026-05-25 10:00
                                    </span>
                                </span>
                            </div>

                            <div class="comment-content" th:text="${comment.content}">
                                댓글 내용
                            </div>

                            <div class="actions"
                                 th:if="${loginUserId != null and loginUserId == comment.writerId}">
                                <button type="button"
                                        class="comment-edit-btn"
                                        th:data-comment-id="${comment.commentId}">
                                    수정
                                </button>

                                <form class="inline-form comment-delete-form"
                                      th:action="@{/communities/posts/{postId}/comments/{commentId}/delete(
                                          postId=${postId},
                                          commentId=${comment.commentId}
                                      )}"
                                      method="post">
                                    <button type="submit" class="danger">삭제</button>
                                </form>
                            </div>
                        </div>

                        <div class="comment-edit-area"
                             th:id="'commentEditArea-' + ${comment.commentId}">

                            <form class="comment-edit-form" th:action="@{/communities/posts/{postId}/comments/{commentId}/edit(
                                      postId=${postId},
                                      commentId=${comment.commentId}
                                  )}"
                                  method="post">

                                <div class="form-row">
                                    <textarea name="content"
                                              rows="3"
                                              maxlength="500"
                                              required
                                              th:text="${comment.content}"></textarea>
                                </div>

                                <div class="actions">
                                    <button type="submit">수정 완료</button>

                                    <button type="button"
                                            class="comment-edit-cancel-btn"
                                            th:data-comment-id="${comment.commentId}">
                                        취소
                                    </button>
                                </div>
                            </form>
                        </div>
                    </article>
                </div>
            </div>
        </section>
    </div>
</main>

<script>
    document.getElementById('logoutBtn')?.addEventListener('click', async () => {
        if (!confirm('로그아웃하시겠습니까?')) return;
        const res = await fetch('/api/auth/logout', { method: 'POST' });
        if (res.ok) location.href = '/auth/login';
        else alert('로그아웃에 실패했습니다.');
    });

    document.addEventListener('submit', async (event) => {
        const form = event.target;

        const isCommentCreate = form.classList.contains('comment-form');
        const isCommentEdit = form.classList.contains('comment-edit-form');
        const isCommentDelete = form.classList.contains('comment-delete-form');

        if (!isCommentCreate && !isCommentEdit && !isCommentDelete) {
            return;
        }

        event.preventDefault();

        if (isCommentDelete && !confirm('댓글을 삭제하시겠습니까?')) {
            return;
        }

        const formData = new FormData(form);

        const response = await fetch(form.action, {
            method: 'POST',
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            },
            body: formData
        });

        if (!response.ok) {
            alert('댓글 처리에 실패했습니다.');
            return;
        }

        const html = await response.text();
        document.getElementById('commentSection').outerHTML = html;
    });

    document.addEventListener('click', (event) => {
        const editButton = event.target.closest('.comment-edit-btn');
        const cancelButton = event.target.closest('.comment-edit-cancel-btn');

        if (editButton) {
            const commentId = editButton.dataset.commentId;
            const commentItem = editButton.closest('.comment-item');
            const viewArea = commentItem.querySelector('.comment-view-area');
            const editArea = document.getElementById(`commentEditArea-${commentId}`);

            viewArea.style.display = 'none';
            editArea.style.display = 'block';
            return;
        }

        if (cancelButton) {
            const commentId = cancelButton.dataset.commentId;
            const commentItem = cancelButton.closest('.comment-item');
            const viewArea = commentItem.querySelector('.comment-view-area');
            const editArea = document.getElementById(`commentEditArea-${commentId}`);

            editArea.style.display = 'none';
            viewArea.style.display = 'block';
        }
    });
</script>
</body>
</html>
