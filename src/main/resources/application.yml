spring:

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO}  # 개발: update / 운영: validate 또는 none
    show-sql: false # 운영환경에서는 false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        generate_statistics: true
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: 50

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    url: /v3/api-docs

kakao:
  rest-api-key: ${KAKAO_REST_API_KEY}

odsay:
  rest-api-keys: ${ODSAY_REST_API_KEY_LIST}

logging:
  level:
    com.itset.itcenteamproject.domain.dashboard.service.CommuteScoreCalculator: DEBUG
    com.itset.itcenteamproject.domain.dashboard.service.CalculatorOrchestrator: INFO
    org.hibernate.stat: DEBUG
    org.hibernate.SQL_SLOW: INFO